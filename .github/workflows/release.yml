name: Release

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'build/Package.props'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if tag exists'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      models: read
      pull-requests: read

    steps:
      # Always fetch the full history and all tags so version/tag checks are accurate
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          echo "HEAD is now: $(git log -1 --oneline)"

      - name: Extract and validate version
        id: version
        run: |
          if [ ! -f build/Package.props ]; then
            echo "ERROR: build/Package.props not found"
            exit 1
          fi

          VERSION=$(grep -oP '(?<=<PackageVersion>)[0-9]+\.[0-9]+\.[0-9]+[^<]*' build/Package.props | head -1)

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract a valid PackageVersion from build/Package.props"
            cat build/Package.props
            exit 1
          fi

          if [[ "$VERSION" =~ [[:space:]] ]]; then
            echo "ERROR: Extracted version '$VERSION' contains whitespace"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag already exists
        id: tag_check
        run: |
          git fetch --tags --force
          TAG="v${{ steps.version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.force }}" == "true" ]; then
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Tag $TAG exists but force=true — deleting and re-creating."
              git push origin ":refs/tags/$TAG" || true
            else
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Tag $TAG already exists. Skipping release."
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist — proceeding."
          fi

      - name: Setup .NET
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore (with retry)
        if: steps.tag_check.outputs.exists == 'false'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            dotnet restore src/PleasantUI/PleasantUI.csproj
            dotnet restore src/PleasantUI.DataGrid/PleasantUI.DataGrid.csproj
            dotnet restore src/PleasantUI.MaterialIcons/PleasantUI.MaterialIcons.csproj
            dotnet restore src/PleasantUI.ToolKit/PleasantUI.ToolKit.csproj

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          dotnet build src/PleasantUI/PleasantUI.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.DataGrid/PleasantUI.DataGrid.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.MaterialIcons/PleasantUI.MaterialIcons.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.ToolKit/PleasantUI.ToolKit.csproj --configuration Release --no-restore

      - name: Verify packages exist
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "=== Searching for all .nupkg files under src/ ==="
          find src/ -name "*.nupkg" 2>/dev/null | sort

          FAILED=0
          for project in PleasantUI PleasantUI.DataGrid PleasantUI.MaterialIcons PleasantUI.ToolKit; do
            FOUND=$(find "src/$project" -name "*.nupkg" 2>/dev/null | head -1)
            if [ -z "$FOUND" ]; then
              echo "ERROR: No .nupkg found anywhere under src/$project"
              find "src/$project/bin" -type f 2>/dev/null || echo "(bin dir not found)"
              FAILED=1
            else
              echo "OK: Found package for $project at $FOUND"
            fi
          done

          [ "$FAILED" -eq 1 ] && exit 1

      - name: Collect commits since last tag
        if: steps.tag_check.outputs.exists == 'false'
        id: commits
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LIST=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%an)" | head -80)
          else
            LIST=$(git log --pretty=format:"- %s (%an)" | head -80)
          fi
          [ -z "$LIST" ] && LIST="- Initial release"

          # Write prompt file for ai-inference action
          cat > /tmp/release-notes-prompt.txt <<EOF
          You are a technical writer generating GitHub release notes for PleasantUI,
          a cross-platform .NET/Avalonia UI theme and control library.
          Write clear, developer-friendly markdown. Only include sections that are relevant.
          Use these sections as needed: ### What's New, ### Improvements, ### Bug Fixes, ### Breaking Changes.
          Be factual — do not invent features not present in the commits.

          Version: v${{ steps.version.outputs.version }}
          Pre-release: ${{ steps.version.outputs.prerelease }}

          Commits since last release:
          $LIST
          EOF

      - name: Generate AI release notes
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_notes
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-completion-tokens: 1024
          prompt-file: /tmp/release-notes-prompt.txt

      - name: Write release notes to file
        if: steps.tag_check.outputs.exists == 'false'
        id: notes_file
        run: |
          # Prefer response-file (handles larger outputs); fall back to inline response
          if [ -f "${{ steps.ai_notes.outputs.response-file }}" ]; then
            cp "${{ steps.ai_notes.outputs.response-file }}" /tmp/release_notes.md
          elif [ -n "${{ steps.ai_notes.outputs.response }}" ]; then
            printf '%s' "${{ steps.ai_notes.outputs.response }}" > /tmp/release_notes.md
          else
            echo "AI generation returned empty — using commit list as fallback."
            echo "### Changes in v${{ steps.version.outputs.version }}" > /tmp/release_notes.md
            grep "^-" /tmp/release-notes-prompt.txt >> /tmp/release_notes.md || true
          fi
          echo "path=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: ${{ steps.notes_file.outputs.path }}
          fail_on_unmatched_files: true
          files: |
            src/PleasantUI/bin/Release/*.nupkg
            src/PleasantUI.DataGrid/bin/Release/*.nupkg
            src/PleasantUI.MaterialIcons/bin/Release/*.nupkg
            src/PleasantUI.ToolKit/bin/Release/*.nupkg

      - name: Confirm release created
        if: steps.tag_check.outputs.exists == 'false'
        run: echo "Release created: ${{ steps.create_release.outputs.url }}"
