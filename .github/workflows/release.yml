name: Release

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'build/Package.props'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if tag exists'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      models: read
      pull-requests: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          echo "HEAD is now: $(git log -1 --oneline)"

      - name: Extract and validate version
        id: version
        run: |
          if [ ! -f build/Package.props ]; then
            echo "ERROR: build/Package.props not found"
            exit 1
          fi

          VERSION=$(grep -oP '(?<=<PackageVersion>)[0-9]+\.[0-9]+\.[0-9]+[^<]*' build/Package.props | head -1)

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract a valid PackageVersion from build/Package.props"
            cat build/Package.props
            exit 1
          fi

          if [[ "$VERSION" =~ [[:space:]] ]]; then
            echo "ERROR: Extracted version '$VERSION' contains whitespace"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag already exists
        id: tag_check
        run: |
          git fetch --tags --force
          TAG="v${{ steps.version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.force }}" == "true" ]; then
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Tag $TAG exists but force=true — deleting and re-creating."
              git push origin ":refs/tags/$TAG" || true
            else
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Tag $TAG already exists. Skipping release."
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist — proceeding."
          fi

      - name: Setup .NET
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore (with retry)
        if: steps.tag_check.outputs.exists == 'false'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            dotnet restore src/PleasantUI/PleasantUI.csproj
            dotnet restore src/PleasantUI.DataGrid/PleasantUI.DataGrid.csproj
            dotnet restore src/PleasantUI.MaterialIcons/PleasantUI.MaterialIcons.csproj
            dotnet restore src/PleasantUI.ToolKit/PleasantUI.ToolKit.csproj

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          dotnet build src/PleasantUI/PleasantUI.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.DataGrid/PleasantUI.DataGrid.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.MaterialIcons/PleasantUI.MaterialIcons.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.ToolKit/PleasantUI.ToolKit.csproj --configuration Release --no-restore

      - name: Verify packages exist
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "=== Searching for all .nupkg files under src/ ==="
          find src/ -name "*.nupkg" 2>/dev/null | sort

          FAILED=0
          for project in PleasantUI PleasantUI.DataGrid PleasantUI.MaterialIcons PleasantUI.ToolKit; do
            FOUND=$(find "src/$project" -name "*.nupkg" 2>/dev/null | head -1)
            if [ -z "$FOUND" ]; then
              echo "ERROR: No .nupkg found anywhere under src/$project"
              find "src/$project/bin" -type f 2>/dev/null || echo "(bin dir not found)"
              FAILED=1
            else
              echo "OK: Found package for $project at $FOUND"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Collect commits and build context chunks
        if: steps.tag_check.outputs.exists == 'false'
        id: collect
        run: |
          # ── Find previous tag ─────────────────────────────────────────────────
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Previous tag: '${PREV_TAG}'"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            FIRST=$(git rev-list --max-parents=0 HEAD)
            RANGE="${FIRST}..HEAD"
          fi
          echo "range=$RANGE" >> $GITHUB_OUTPUT
          echo "Diff range: $RANGE"

          # ── Commit log ────────────────────────────────────────────────────────
          COMMITS=$(git log "$RANGE" --pretty=format:"[%h] %s (%an, %ad)" --date=short)
          [ -z "$COMMITS" ] && COMMITS="(no commits in range — possibly initial release)"

          # ── Changed files (excl. samples/) ────────────────────────────────────
          FILE_LIST=$(git diff --name-only "$RANGE" | grep -v '^samples/' | head -200)
          STAT_SUMMARY=$(git diff --shortstat "$RANGE" | tail -1)

          # ── Public API additions ───────────────────────────────────────────────
          API_SURFACE=$(git diff "$RANGE" -- '*.cs' \
            | grep '^+[^+]' \
            | grep -v '^+.*\/\/' \
            | grep -E '\s(public|protected)\s' \
            | grep -E '(class |interface |enum |record |struct |void |bool |int |string |Task|AvaloniaProperty|StyledProperty|DirectProperty|AttachedProperty|RoutedEvent)' \
            | sed 's/^+//' \
            | sed 's/^[[:space:]]*//' \
            | sort -u \
            | head -200)

          # ── Shared system prompt — all printf, no heredoc ──────────────────────
          printf '%s\n' \
            'You are a senior technical writer producing GitHub release notes for PleasantUI — a cross-platform UI theme and control library for Avalonia (.NET), inspired by Microsoft Fluent Design / WinUI.' \
            'Your goal is DETAILED, COMPREHENSIVE release notes that are genuinely useful to developers consuming this library as a NuGet package.' \
            '' \
            '## Instructions' \
            '- Carefully read every file diff provided. Each diff is a COMPLETE per-file diff so you have full context.' \
            '- For every new control or feature: describe what it does, how to use it, and why it matters.' \
            '- For new properties/events/attached properties: list name, type, and a one-line description.' \
            '- For bug fixes: describe the symptom fixed, not just the commit message.' \
            '- For breaking changes: show before/after API.' \
            '- Use markdown: ### headers, bullet lists, inline code, and fenced code blocks for usage examples.' \
            '- Do NOT invent anything not evidenced by the data. If something is unclear, describe it conservatively.' \
            '- If the diff or file list is empty, say so honestly and only describe what the commits indicate.' \
            '- This is ONE BATCH of changed files — output your findings as bullet points, NOT final release notes.' \
            '' \
            '---' \
            > /tmp/system-prompt.txt

          # ── Prompt 1: commits + files + API surface (always fits, no diff) ─────
          {
            cat /tmp/system-prompt.txt
            printf '\n'
            printf 'Version: v%s  |  Pre-release: %s\n\n' \
              "${{ steps.version.outputs.version }}" \
              "${{ steps.version.outputs.prerelease }}"
            printf '## Commit Log\n```\n%s\n```\n\n' "$COMMITS"
            printf '## All Changed Files (excl. samples/)\n```\n%s\n\nSummary: %s\n```\n\n' \
              "$FILE_LIST" "$STAT_SUMMARY"
            if [ -n "$API_SURFACE" ]; then
              printf '## New / Modified Public API\n```csharp\n%s\n```\n' "$API_SURFACE"
            fi
          } > /tmp/prompt-1.txt

          # ── Split diff per-file into batches of ~700 lines each ───────────────
          # We collect complete per-file diffs so AI always sees a whole file diff,
          # never a mid-function cut. Max 5 diff batches (prompts 2-6).
          CHANGED_SRC=$(git diff --name-only "$RANGE" \
            | grep -v '^samples/' \
            | grep -E '\.(cs|axaml)$')

          mkdir -p /tmp/prompts
          cp /tmp/prompt-1.txt /tmp/prompts/

          BATCH_NUM=2
          BATCH_LINES=0
          BATCH_CONTENT=""
          MAX_BATCH_LINES=700
          MAX_BATCHES=5

          for FILE in $CHANGED_SRC; do
            FILE_DIFF=$(git diff "$RANGE" --unified=3 -- "$FILE" 2>/dev/null)
            [ -z "$FILE_DIFF" ] && continue

            FILE_LINES=$(printf '%s\n' "$FILE_DIFF" | wc -l)

            # If adding this file would overflow the batch, flush current batch first
            if [ $BATCH_LINES -gt 0 ] && [ $(( BATCH_LINES + FILE_LINES )) -gt $MAX_BATCH_LINES ]; then
              if [ $BATCH_NUM -le $(( MAX_BATCHES + 1 )) ]; then
                PART_NUM=$(( BATCH_NUM - 1 ))
                {
                  cat /tmp/system-prompt.txt
                  printf '\nThis is diff batch %d. Analyse each file diff completely and list your findings.\n\n' "$PART_NUM"
                  printf '%s\n' "$BATCH_CONTENT"
                } > "/tmp/prompts/prompt-${BATCH_NUM}.txt"
                echo "Batch ${BATCH_NUM}: ${BATCH_LINES} lines -> /tmp/prompts/prompt-${BATCH_NUM}.txt"
                BATCH_NUM=$(( BATCH_NUM + 1 ))
              fi
              BATCH_LINES=0
              BATCH_CONTENT=""
            fi

            # Accumulate into current batch (skip if we already hit max batches)
            if [ $BATCH_NUM -le $(( MAX_BATCHES + 1 )) ]; then
              BATCH_CONTENT=$(printf '%s\n\n### File: %s\n```diff\n%s\n```\n' \
                "$BATCH_CONTENT" "$FILE" "$FILE_DIFF")
              BATCH_LINES=$(( BATCH_LINES + FILE_LINES ))
            fi
          done

          # Flush final batch
          if [ $BATCH_LINES -gt 0 ] && [ $BATCH_NUM -le $(( MAX_BATCHES + 1 )) ]; then
            PART_NUM=$(( BATCH_NUM - 1 ))
            {
              cat /tmp/system-prompt.txt
              printf '\nThis is diff batch %d. Analyse each file diff completely and list your findings.\n\n' "$PART_NUM"
              printf '%s\n' "$BATCH_CONTENT"
            } > "/tmp/prompts/prompt-${BATCH_NUM}.txt"
            echo "Batch ${BATCH_NUM}: ${BATCH_LINES} lines -> /tmp/prompts/prompt-${BATCH_NUM}.txt"
          fi

          # ── Ensure prompts 2-6 exist (empty marker if no content) ─────────────
          for N in 2 3 4 5 6; do
            if [ ! -f "/tmp/prompts/prompt-${N}.txt" ]; then
              printf 'No diff content for this batch.\n' > "/tmp/prompts/prompt-${N}.txt"
            fi
          done

          echo "=== All prompt sizes ==="
          for N in 1 2 3 4 5 6; do
            printf 'prompt-%d.txt: %d bytes\n' "$N" "$(wc -c < /tmp/prompts/prompt-${N}.txt)"
          done

      - name: Upload prompt artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ai-prompts
          path: /tmp/prompts/
          retention-days: 1

      # ── AI passes — each gets complete per-file diffs, never a mid-file cut ───
      - name: AI pass 1 — commits + API surface
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_pass1
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 3000
          prompt-file: /tmp/prompts/prompt-1.txt

      - name: AI pass 2 — diff batch 1
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_pass2
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 3000
          prompt-file: /tmp/prompts/prompt-2.txt

      - name: AI pass 3 — diff batch 2
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_pass3
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 3000
          prompt-file: /tmp/prompts/prompt-3.txt

      - name: AI pass 4 — diff batch 3
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_pass4
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 3000
          prompt-file: /tmp/prompts/prompt-4.txt

      - name: AI pass 5 — diff batch 4
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_pass5
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 3000
          prompt-file: /tmp/prompts/prompt-5.txt

      - name: AI pass 6 — diff batch 5
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_pass6
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 3000
          prompt-file: /tmp/prompts/prompt-6.txt

      - name: Build merge prompt
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          # all printf — no heredoc to avoid YAML indent issues
          printf '%s\n' \
            'You are a senior technical writer for PleasantUI — a cross-platform UI theme and control library for Avalonia (.NET).' \
            'Below are analysis findings from multiple passes over the release diff.' \
            'Merge them into a single, clean, non-redundant GitHub release document.' \
            'Deduplicate findings that appear in multiple passes. Prefer the most detailed description.' \
            '' \
            'Use these sections (include only those with content):' \
            '### What is New' \
            '### Improvements' \
            '### Bug Fixes' \
            '### Breaking Changes' \
            '### Packages' \
            '' \
            'Always end with a Packages section listing:' \
            '- PleasantUI' \
            '- PleasantUI.DataGrid' \
            '- PleasantUI.MaterialIcons' \
            '- PleasantUI.ToolKit' \
            '' \
            '---' \
            > /tmp/prompt-merge.txt

          {
            printf '## Pass 1 — Commits, changed files, public API\n'
            cat "${{ steps.ai_pass1.outputs.response-file }}" 2>/dev/null || printf '(no output)\n'
            printf '\n## Pass 2 — Diff batch 1\n'
            cat "${{ steps.ai_pass2.outputs.response-file }}" 2>/dev/null || printf '(no output)\n'
            printf '\n## Pass 3 — Diff batch 2\n'
            cat "${{ steps.ai_pass3.outputs.response-file }}" 2>/dev/null || printf '(no output)\n'
            printf '\n## Pass 4 — Diff batch 3\n'
            cat "${{ steps.ai_pass4.outputs.response-file }}" 2>/dev/null || printf '(no output)\n'
            printf '\n## Pass 5 — Diff batch 4\n'
            cat "${{ steps.ai_pass5.outputs.response-file }}" 2>/dev/null || printf '(no output)\n'
            printf '\n## Pass 6 — Diff batch 5\n'
            cat "${{ steps.ai_pass6.outputs.response-file }}" 2>/dev/null || printf '(no output)\n'
          } >> /tmp/prompt-merge.txt

          echo "Merge prompt size: $(wc -c < /tmp/prompt-merge.txt) bytes"

      - name: Merge AI findings into final release notes
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_merge
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000
          max-completion-tokens: 4000
          prompt-file: /tmp/prompt-merge.txt

      - name: Write release notes to file
        if: steps.tag_check.outputs.exists == 'false'
        id: notes_file
        run: |
          RESPONSE_FILE="${{ steps.ai_merge.outputs.response-file }}"

          if [ -f "$RESPONSE_FILE" ] && [ -s "$RESPONSE_FILE" ]; then
            cp "$RESPONSE_FILE" /tmp/release_notes.md
            echo "Using merged AI-generated release notes."
          else
            # Fallback: concatenate all pass responses
            {
              printf '### Changes in v%s\n\n' "${{ steps.version.outputs.version }}"
              for RF in \
                "${{ steps.ai_pass1.outputs.response-file }}" \
                "${{ steps.ai_pass2.outputs.response-file }}" \
                "${{ steps.ai_pass3.outputs.response-file }}" \
                "${{ steps.ai_pass4.outputs.response-file }}" \
                "${{ steps.ai_pass5.outputs.response-file }}" \
                "${{ steps.ai_pass6.outputs.response-file }}"; do
                [ -f "$RF" ] && [ -s "$RF" ] && cat "$RF" && printf '\n'
              done
            } > /tmp/release_notes.md
            echo "Used fallback concatenation of pass responses."
          fi

          echo "path=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: ${{ steps.notes_file.outputs.path }}
          fail_on_unmatched_files: true
          files: |
            src/PleasantUI/bin/Release/*.nupkg
            src/PleasantUI.DataGrid/bin/Release/*.nupkg
            src/PleasantUI.MaterialIcons/bin/Release/*.nupkg
            src/PleasantUI.ToolKit/bin/Release/*.nupkg

      - name: Confirm release created
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "Release created: ${{ steps.create_release.outputs.url }}"

      - name: Publish to GitHub Packages
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          dotnet nuget add source \
            --username ghudulf \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/ghudulf/index.json" || true

          for pkg in \
            src/PleasantUI/bin/Release/*.nupkg \
            src/PleasantUI.DataGrid/bin/Release/*.nupkg \
            src/PleasantUI.MaterialIcons/bin/Release/*.nupkg \
            src/PleasantUI.ToolKit/bin/Release/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source "github" \
              --skip-duplicate
          done
