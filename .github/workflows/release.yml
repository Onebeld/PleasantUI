name: Release

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'build/Package.props'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if tag exists'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      models: read
      pull-requests: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Pull latest changes
        run: |
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          echo "HEAD is now: $(git log -1 --oneline)"

      - name: Extract and validate version
        id: version
        run: |
          if [ ! -f build/Package.props ]; then
            echo "ERROR: build/Package.props not found"
            exit 1
          fi

          VERSION=$(grep -oP '(?<=<PackageVersion>)[0-9]+\.[0-9]+\.[0-9]+[^<]*' build/Package.props | head -1)

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract a valid PackageVersion from build/Package.props"
            cat build/Package.props
            exit 1
          fi

          if [[ "$VERSION" =~ [[:space:]] ]]; then
            echo "ERROR: Extracted version '$VERSION' contains whitespace"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag already exists
        id: tag_check
        run: |
          git fetch --tags --force
          TAG="v${{ steps.version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.force }}" == "true" ]; then
              echo "exists=false" >> $GITHUB_OUTPUT
              echo "Tag $TAG exists but force=true — deleting and re-creating."
              git push origin ":refs/tags/$TAG" || true
            else
              echo "exists=true" >> $GITHUB_OUTPUT
              echo "Tag $TAG already exists. Skipping release."
            fi
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist — proceeding."
          fi

      - name: Setup .NET
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore (with retry)
        if: steps.tag_check.outputs.exists == 'false'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 15
          command: |
            dotnet restore src/PleasantUI/PleasantUI.csproj
            dotnet restore src/PleasantUI.DataGrid/PleasantUI.DataGrid.csproj
            dotnet restore src/PleasantUI.MaterialIcons/PleasantUI.MaterialIcons.csproj
            dotnet restore src/PleasantUI.ToolKit/PleasantUI.ToolKit.csproj

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          dotnet build src/PleasantUI/PleasantUI.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.DataGrid/PleasantUI.DataGrid.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.MaterialIcons/PleasantUI.MaterialIcons.csproj --configuration Release --no-restore
          dotnet build src/PleasantUI.ToolKit/PleasantUI.ToolKit.csproj --configuration Release --no-restore

      - name: Verify packages exist
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "=== Searching for all .nupkg files under src/ ==="
          find src/ -name "*.nupkg" 2>/dev/null | sort

          FAILED=0
          for project in PleasantUI PleasantUI.DataGrid PleasantUI.MaterialIcons PleasantUI.ToolKit; do
            FOUND=$(find "src/$project" -name "*.nupkg" 2>/dev/null | head -1)
            if [ -z "$FOUND" ]; then
              echo "ERROR: No .nupkg found anywhere under src/$project"
              find "src/$project/bin" -type f 2>/dev/null || echo "(bin dir not found)"
              FAILED=1
            else
              echo "OK: Found package for $project at $FOUND"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Collect commits and build prompt
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          # ── Find previous tag ─────────────────────────────────────────────────
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Previous tag: '${PREV_TAG}'"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            # No previous tag — diff against the very first commit
            FIRST=$(git rev-list --max-parents=0 HEAD)
            RANGE="${FIRST}..HEAD"
          fi
          echo "Diff range: $RANGE"

          # ── Commit log ────────────────────────────────────────────────────────
          COMMITS=$(git log "$RANGE" --pretty=format:"[%h] %s (%an, %ad)" --date=short)
          [ -z "$COMMITS" ] && COMMITS="(no commits in range — possibly initial release)"
          echo "Commit count: $(echo "$COMMITS" | wc -l)"

          # ── Changed files (whole repo, not just src/) ─────────────────────────
          FILE_LIST=$(git diff --name-only "$RANGE" | grep -v '^samples/' | head -120)
          STAT_SUMMARY=$(git diff --shortstat "$RANGE" | tail -1)
          echo "Files changed: $STAT_SUMMARY"

          # ── Source diff — .cs and .axaml across entire repo except samples ─────
          # Use git diff with explicit pathspecs (no shell globs)
          SRC_DIFF=$(git diff "$RANGE" --unified=2 \
            -- '*.cs' '*.axaml' \
            | grep -v '^diff --git a/samples/' \
            | grep -v '^--- a/samples/' \
            | grep -v '^+++ b/samples/' \
            | head -2500)

          echo "Diff lines captured: $(echo "$SRC_DIFF" | wc -l)"

          # ── Public API additions ───────────────────────────────────────────────
          API_SURFACE=$(git diff "$RANGE" -- '*.cs' \
            | grep '^+[^+]' \
            | grep -v '^+.*\/\/' \
            | grep -E '\s(public|protected)\s' \
            | grep -E '(class |interface |enum |record |struct |void |bool |int |string |Task|AvaloniaProperty|StyledProperty|DirectProperty|AttachedProperty|RoutedEvent)' \
            | sed 's/^+//' \
            | sed 's/^[[:space:]]*//' \
            | sort -u \
            | head -150)

          # ── Write prompt (all printf — no heredoc to avoid YAML indent issues) ───
          printf '%s\n' \
            'You are a senior technical writer producing GitHub release notes for PleasantUI — a cross-platform UI theme and control library for Avalonia (.NET), inspired by Microsoft Fluent Design / WinUI.' \
            '' \
            'Your goal is DETAILED, COMPREHENSIVE release notes that are genuinely useful to developers consuming this library as a NuGet package.' \
            '' \
            '## Instructions' \
            '- Carefully read the commit log, changed file list, public API additions, and source diff below.' \
            '- For every new control or feature: describe what it does, how to use it, and why it matters.' \
            '- For new properties/events: list name, type, and a one-line description.' \
            '- For bug fixes: describe the symptom fixed, not just the commit message.' \
            '- For breaking changes: show before/after API.' \
            '- Use markdown: ### headers, bullet lists, inline `code`, and fenced code blocks for usage examples.' \
            '- Do NOT invent anything not evidenced by the data. If something is unclear, describe it conservatively.' \
            '- If the diff or file list is empty, say so honestly and only describe what the commits indicate.' \
            '' \
            'Sections (include only those with content):' \
            '### What is New' \
            '### Improvements' \
            '### Bug Fixes' \
            '### Breaking Changes' \
            '### Packages' \
            '' \
            'Always end with a Packages section listing:' \
            '- PleasantUI' \
            '- PleasantUI.DataGrid' \
            '- PleasantUI.MaterialIcons' \
            '- PleasantUI.ToolKit' \
            '' \
            '---' \
            > /tmp/release-notes-prompt.txt

          # ── Append dynamic data with printf (safe — no shell eval of content) ──
          {
            printf 'Version: v%s  |  Pre-release: %s\n\n' \
              "${{ steps.version.outputs.version }}" \
              "${{ steps.version.outputs.prerelease }}"

            printf '## Commit Log\n```\n%s\n```\n\n' "$COMMITS"

            printf '## Changed Files (excl. samples/)\n```\n%s\n\nSummary: %s\n```\n\n' \
              "$FILE_LIST" "$STAT_SUMMARY"

            if [ -n "$API_SURFACE" ]; then
              printf '## New / Modified Public API\n```csharp\n%s\n```\n\n' "$API_SURFACE"
            fi

            printf '## Source Diff (*.cs + *.axaml, excl. samples/, first 2500 lines)\n```diff\n%s\n```\n' \
              "$SRC_DIFF"
          } >> /tmp/release-notes-prompt.txt

          echo "=== Prompt size: $(wc -c < /tmp/release-notes-prompt.txt) bytes ==="

      - name: Generate AI release notes
        if: steps.tag_check.outputs.exists == 'false'
        id: ai_notes
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          max-tokens: 8000 
          max-completion-tokens: 8000
          prompt-file: /tmp/release-notes-prompt.txt

      - name: Write release notes to file
        if: steps.tag_check.outputs.exists == 'false'
        id: notes_file
        run: |
          # Only use response-file — never inline the AI response into shell to avoid injection
          RESPONSE_FILE="${{ steps.ai_notes.outputs.response-file }}"

          if [ -f "$RESPONSE_FILE" ] && [ -s "$RESPONSE_FILE" ]; then
            cp "$RESPONSE_FILE" /tmp/release_notes.md
            echo "Using AI-generated release notes from response file."
          else
            echo "AI response file missing or empty — falling back to commit list."
            {
              echo "### Changes in v${{ steps.version.outputs.version }}"
              grep "^-" /tmp/release-notes-prompt.txt || true
            } > /tmp/release_notes.md
          fi

          echo "path=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body_path: ${{ steps.notes_file.outputs.path }}
          fail_on_unmatched_files: true
          files: |
            src/PleasantUI/bin/Release/*.nupkg
            src/PleasantUI.DataGrid/bin/Release/*.nupkg
            src/PleasantUI.MaterialIcons/bin/Release/*.nupkg
            src/PleasantUI.ToolKit/bin/Release/*.nupkg

      - name: Confirm release created
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          echo "Release created: ${{ steps.create_release.outputs.url }}"

      - name: Publish to GitHub Packages
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          dotnet nuget add source \
            --username ghudulf \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/ghudulf/index.json" || true

          for pkg in \
            src/PleasantUI/bin/Release/*.nupkg \
            src/PleasantUI.DataGrid/bin/Release/*.nupkg \
            src/PleasantUI.MaterialIcons/bin/Release/*.nupkg \
            src/PleasantUI.ToolKit/bin/Release/*.nupkg; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source "github" \
              --skip-duplicate
          done
